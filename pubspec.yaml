name: flutter_qr_scanner
description: A simple QR Scanner Flutter application with mock data

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # QR Scanner
  mobile_scanner: ^3.5.5
  
  # State Management
  provider: ^6.1.1
  
  # Utilities
  intl: ^0.19.0
  share_plus: ^7.2.1
  url_launcher: ^6.2.2
  clipboard: ^0.1.3
  
  # UI Components
  cupertino_icons: ^1.0.6
  lottie: ^3.0.0
  shimmer: ^3.0.0

  # For web support
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/json/
